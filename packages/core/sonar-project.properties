sonar.organization=juntossomosmais
sonar.projectKey=juntossomosmais_atomium_core

sonar.sources=src

sonar.test.inclusions=\
**/*.spec.js,\
**/*.spec.jsx,\
**/*.spec.ts,\
**/*.spec.tsx

sonar.coverage.exclusions=\
src/components/grid/col/col.tsx,\
output-target/*.spec.ts,\
output-target/index.ts
sonar.cpd.exclusions=\
src/components/textarea/**
sonar.exclusions=\
src/**/stories/**,\
src/global/**,\
src/components.d.ts,\
src/storybook-declarations.d.ts,\
src/typings.d.ts,\
src/index.ts

sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Disable React-only JSX rules that give false positives on Stencil.
# Stencil JSX uses DOM attribute names (class, innerHTML), not React props
# (className), so S6747 ("unknown property, use className") and the related
# S6757 are invalid here. Same approach used by the Stencil lib lime-elements.
sonar.issue.ignore.multicriteria=stencilJsx1,stencilJsx2
sonar.issue.ignore.multicriteria.stencilJsx1.ruleKey=typescript:S6747
sonar.issue.ignore.multicriteria.stencilJsx1.resourceKey=**/*.tsx
sonar.issue.ignore.multicriteria.stencilJsx2.ruleKey=typescript:S6757
sonar.issue.ignore.multicriteria.stencilJsx2.resourceKey=**/*.tsx
